//////////////// practice_cheats.cfg ////////////////
sv_cheats 1

// Buy anywhere, anytime, lots of money
mp_buy_anywhere 1
mp_buytime 60000
mp_maxmoney 65535
mp_startmoney 65535
mp_roundtime_defuse 60
mp_roundtime_hostage 60
mp_roundtime 60

//kick all bots
bot_kick

// Unlimited ammo & grenades
sv_infinite_ammo 1           // infinite ammo (reload required)
ammo_grenade_limit_total 6   // carry many grenade types
mp_death_drop_grenade 0      // don't drop grenades on death
mp_death_drop_gun 0          // keep guns on death

// Rebuy grenades after respawn: press F4 to get all grenades
// (bypasses the per-round purchase limit that blocks rebuying)
bind "F4" "give weapon_flashbang; give weapon_smokegrenade; give weapon_hegrenade; give weapon_molotov; give weapon_decoy"

// Free team switching / no limits
mp_autoteambalance 0
mp_limitteams 0

// Bullet trajectory / impact viz
sv_showimpacts 1
sv_showimpacts_penetration 0

// Optional: let players respawn quickly when practicing
mp_respawn_on_death_t 1
mp_respawn_on_death_ct 1
/////////////////////////////////////////////////////

sv_grenade_trajectory_prac_pipreview true

mp_freezetime 0
mp_warmup_end

mp_restartgame 1

echo "================================="
echo "||Loaded NAFI's Practice Mode||"
echo "================================="
